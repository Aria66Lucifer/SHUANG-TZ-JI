<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>貓咪圖標選項</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1E1E2E;
      color: #CDD6F4;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2rem;
      margin-top: 2rem;
    }
    .card {
      background: #313244;
      padding: 2rem;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
    .card h3 { margin: 0; color: #F38BA8; }
    svg {
      color: #F9E2AF;
    }
  </style>
</head>
<body>
  <h1>請選擇您喜歡的貓咪風格</h1>
  <p>您可以直接點開這個網頁來預覽這四種風格的貓咪，並告訴我您喜歡哪一個（選項 A ~ D）！</p>
  
  <div class="grid">
    <!-- Option A: 胖嘟嘟麻糬貓 -->
    <div class="card">
      <h3>選項 A：胖嘟嘟麻糬貓</h3>
      <svg viewBox="0 0 100 100" width="120" height="120">
        <g stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <!-- Body -->
          <path d="M 20 60 C 20 30, 80 30, 80 60 C 80 90, 20 90, 20 60 Z" />
          <!-- Ears -->
          <path d="M 25 40 L 20 15 L 40 30 M 75 40 L 80 15 L 60 30" />
          <!-- Eyes -->
          <circle cx="35" cy="50" r="3" fill="currentColor" stroke="none" />
          <circle cx="65" cy="50" r="3" fill="currentColor" stroke="none" />
          <!-- Mouth -->
          <path d="M 45 55 Q 50 60 55 55" />
          <!-- Paws holding coin -->
          <path d="M 40 75 C 45 70, 55 70, 60 75" />
          <circle cx="50" cy="70" r="8" />
          <rect x="47" y="67" width="6" height="6" fill="currentColor" stroke="none" />
        </g>
      </svg>
    </div>

    <!-- Option B: 極簡線條招財貓 -->
    <div class="card">
      <h3>選項 B：優雅極簡線條</h3>
      <svg viewBox="0 0 100 100" width="120" height="120">
        <g stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <!-- Continuous-like profile -->
          <path d="M 30 80 C 20 80, 20 40, 30 30 L 35 15 L 45 25 Q 50 22 55 25 L 65 15 L 70 30 C 80 40, 80 70, 80 80" />
          <path d="M 30 80 C 40 85, 60 85, 80 80" />
          <!-- Simple Face -->
          <path d="M 40 45 Q 45 42 50 45 M 60 45 Q 55 42 50 45" />
          <circle cx="50" cy="52" r="2" fill="currentColor" stroke="none"/>
          <!-- Raised Paw -->
          <path d="M 75 60 C 90 50, 90 35, 75 45" />
          <circle cx="75" cy="35" r="5" />
        </g>
      </svg>
    </div>

    <!-- Option C: 日式不倒翁招財貓 -->
    <div class="card">
      <h3>選項 C：日式傳統不倒翁</h3>
      <svg viewBox="0 0 100 100" width="120" height="120">
        <g stroke="currentColor" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <!-- Round Body -->
          <circle cx="50" cy="55" r="35" />
          <!-- Ears inside -->
          <path d="M 25 30 L 15 5 L 40 20 M 75 30 L 85 5 L 60 20" />
          <!-- Belly pattern -->
          <path d="M 30 55 C 30 75, 70 75, 70 55" />
          <!-- Eyes -->
          <path d="M 35 45 Q 40 40 45 45 M 55 45 Q 60 40 65 45" />
          <!-- Nose & Whiskers -->
          <circle cx="50" cy="52" r="2" fill="currentColor" stroke="none"/>
          <path d="M 20 45 L 30 48 M 20 52 L 30 52 M 80 45 L 70 48 M 80 52 L 70 52" stroke-width="2" />
          <!-- Paw -->
          <path d="M 70 50 C 85 30, 95 40, 75 60" />
        </g>
      </svg>
    </div>

    <!-- Option D: 可愛大頭貓 -->
    <div class="card">
      <h3>選項 D：大眼 Q 版小貓</h3>
      <svg viewBox="0 0 100 100" width="120" height="120">
        <g stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <!-- Big Head -->
          <path d="M 20 50 C 20 20, 80 20, 80 50 C 80 75, 20 75, 20 50 Z" />
          <!-- Small Body -->
          <path d="M 35 70 C 35 90, 65 90, 65 70" />
          <!-- Ears -->
          <path d="M 25 35 L 20 10 L 45 25 M 75 35 L 80 10 L 55 25" />
          <!-- Huge Eyes -->
          <circle cx="35" cy="45" r="6" fill="currentColor" />
          <circle cx="65" cy="45" r="6" fill="currentColor" />
          <circle cx="33" cy="43" r="2" fill="#1E1E2E" stroke="none" />
          <circle cx="63" cy="43" r="2" fill="#1E1E2E" stroke="none" />
          <!-- Tiny Mouth -->
          <path d="M 45 55 Q 50 60 55 55" stroke-width="2" />
          <!-- Small Paw -->
          <path d="M 65 75 Q 80 60 70 85" />
          <circle cx="75" cy="65" r="4" />
        </g>
      </svg>
    </div>
  </div>
</body>
</html>
